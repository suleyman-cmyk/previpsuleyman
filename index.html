<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vegasslot Contact</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f1a;
        color: white;
        overflow-x: hidden;
    }

    /* animated background */
    .bg {
        position: fixed;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 20% 20%, #ff00cc33, transparent 40%),
                    radial-gradient(circle at 80% 30%, #00ffee22, transparent 40%),
                    radial-gradient(circle at 50% 80%, #6600ff22, transparent 40%);
        animation: move 12s linear infinite;
        z-index: -1;
    }

    @keyframes move {
        0% { transform: translate(0,0); }
        50% { transform: translate(-10%, -10%); }
        100% { transform: translate(0,0); }
    }

    .container {
        text-align: center;
        padding: 80px 20px;
    }

    h1 {
        font-size: 40px;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #ff00cc, #00ffee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p {
        color: #aaa;
        margin-bottom: 40px;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 300px;
        margin: auto;
    }

    a.button {
        text-decoration: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: bold;
        color: white;
        transition: 0.3s;
        border: 1px solid #ffffff22;
        backdrop-filter: blur(10px);
    }

    a.button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #00ffee55;
    }

    .whatsapp { background: #25D36622; }
    .telegram { background: #229ED922; }
    .site { background: #ffffff11; }

    footer {
        margin-top: 60px;
        font-size: 12px;
        color: #666;
    }
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">
    <h1>VEGASSLOT</h1>
    <p>Güncel iletişim ve site bağlantıları</p>

    <div class="buttons">
        <a class="button whatsapp" href="https://wa.me/995593589722" target="_blank">
            📱 WhatsApp İletişim
        </a>

        <a class="button telegram" href="https://t.me/suleymanslot" target="_blank">
            ✈️ Telegram İletişim
        </a>

        <a class="button site" href="https://vegasslot345.com" target="_blank">
            🌐 Güncel Site
        </a>
    </div>

    <footer>
        © Vegasslot - Tüm hakları saklıdır
    </footer>
</div>

</body>
</html>
